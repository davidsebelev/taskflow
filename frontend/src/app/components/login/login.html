<div class="login-page">
  <div class="login-card">
    <div class="logo-box">✔</div>
    <h1>{{ 'login.title' | t }}</h1>
    <p>{{ 'login.subtitle' | t }}</p>
    
    <div class="field">
      <label>{{ 'login.username' | t }}</label>
      <input [(ngModel)]="username" type="text" [placeholder]="'login.usernamePlaceholder' | t">
    </div>

    <div class="field">
      <label>{{ 'login.password' | t }}</label>
      <input [(ngModel)]="password" type="password" placeholder="••••••••">
    </div>

    <button class="submit-btn" (click)="onLogin()">{{ 'login.signIn' | t }}</button>
  </div>
</div>
